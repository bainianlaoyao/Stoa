appId: dev.stoa.app
productName: Stoa
directories:
  output: release
files:
  - out/**
  - package.json
asarUnpack:
  - node_modules/node-pty/**
publish:
  provider: github
  owner: "${env.GH_OWNER}"
  repo: "${env.GH_REPO}"
  releaseType: release
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
win:
  icon: build/icons/icon.ico
  target:
    - nsis
npmRebuild: false
electronVersion: 37.4.0
