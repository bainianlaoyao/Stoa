appId: dev.stoa.app
productName: Stoa
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - from: research/upstreams/evolver
    to: evolver
asarUnpack:
  - node_modules/node-pty/**
  - out/tools/entire-bridge/**
publish:
  provider: github
  owner: "${env.GH_OWNER}"
  repo: "${env.GH_REPO}"
  releaseType: release
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
win:
  icon: build/icons/icon.ico
  target:
    - nsis
    - target: portable
      arch:
        - x64
npmRebuild: false
electronVersion: 37.4.0
